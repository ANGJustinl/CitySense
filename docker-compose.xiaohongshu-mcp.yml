services:
  xiaohongshu-mcp:
    image: citysense/xiaohongshu-mcp:0cf885c
    build:
      context: .
      dockerfile: dockerfiles/xiaohongshu-mcp.Dockerfile
    container_name: citysense-xiaohongshu-mcp
    restart: unless-stopped
    init: true
    tty: true
    environment:
      ROD_BROWSER_BIN: /usr/bin/google-chrome
      COOKIES_PATH: /app/data/cookies.json
      XHS_PROXY: ${XHS_PROXY:-}
    ports:
      - "18060:18060"
    volumes:
      - ./docker/xiaohongshu-mcp/data:/app/data
      - ./docker/xiaohongshu-mcp/images:/app/images
